<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>更新</title>
</head>
<body>
<h1>受講生情報</h1>
<p>courses size: <span th:text="${#lists.size(studentDetail.studentsCourses)}"></span></p>
<form th:action="@{/updateStudent}" th:object="${studentDetail}" method="post">
  <input type="hidden" th:field="*{student.id}" />
  <div>
    <label for="name">名前</label>
    <input type="text" id="name" th:field="*{student.name}" required/>
  </div>
  <div>
    <label>カナ：</label>
    <input type="text" id="kana" th:field="*{student.kana}" required/>
  </div>
  <div>
    <label for="age">年齢</label>
    <input type="number" id="age" th:field="*{student.age}" required/>
  </div>
  <div>
    <label for="nickname">ニックネーム</label>
    <input type="text" id="nickname" th:field="*{student.nickname}" required/>
  </div>
  <div>
    <label for="email">メール</label>
    <input type="email" id="email" th:field="*{student.email}" required/>
  </div>
  <div>
    <label for="region">地域</label>
    <input type="text" id="region" th:field="*{student.region}" required/>
  </div>
  <div>
    <label for="gender">性別</label>
    <select id="gender" th:field="*{student.gender}">
      <option value="">選択してください</option>
      <option value="male">男性</option>
      <option value="female">女性</option>
      <option value="nonbinary">解答なし</option>
      <option value="other">その他</option>
    </select>
  </div>
  <div>
    <label for="remark">備考</label>
    <textarea id="remark" th:field="*{student.remark}"></textarea>
  </div>
  <h2>コース情報</h2>
  <div th:each="course, iStat : *{studentsCourses}">
    <input type="hidden" th:field="*{studentsCourses[__${iStat.index}__].id}" />
    <input type="hidden" th:field="*{studentsCourses[__${iStat.index}__].studentsId}" />
    <div>
      <label th:for="'courseName' + ${iStat.index}">コース名</label>
      <input type="text" th:id="'courseName' + ${iStat.index}" th:field="*{studentsCourses[__${iStat.index}__].courseName}" required />
    </div>
    <div>
      <label th:for="'startDate' + ${iStat.index}">開始日</label>
      <input type="date" th:id="'startDate' + ${iStat.index}" th:field="*{studentsCourses[__${iStat.index}__].startDate}" required />
    </div>
    <div>
      <label th:for="'expectedEndDate' + ${iStat.index}">終了予定日</label>
      <input type="date" th:id="'expectedEndDate' + ${iStat.index}" th:field="*{studentsCourses[__${iStat.index}__].expectedEndDate}" required />
    </div>
    <hr>
  </div>
  <div>
    <label>
      <input type="checkbox" th:field="*{student.deleted}" />
      削除
    </label>
  </div>
  <div>
    <button type="submit">更新</button>
  </div>
</form>
</body>
</html>
