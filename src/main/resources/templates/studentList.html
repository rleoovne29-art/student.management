<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>受講生情報一覧</title>
</head>
<body>
<h1>受講生情報一覧</h1>
<table border="1">
  <thead>
  <tr>
    <th>ID</th>
    <th>名前</th>
    <th>カナ名</th>
    <th>年齢</th>
    <th>ニックネーム</th>
    <th>メールアドレス</th>
    <th>地域</th>
    <th>性別</th>
    <th>備考</th>
    <th>コース名</th>
    <th>詳細</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="studentDetail : ${studentList}">
    <td>
      <a th:href="@{'/student/' + ${studentDetail.student.id}}">
        <span th:text="${studentDetail.student.id}"></span>
      </a>
    </td>
    <td th:text="${studentDetail.student.name}">山田太郎</td>
    <td th:text="${studentDetail.student.kana}">ヤマダタロウ</td>
    <td th:text="${studentDetail.student.age}">22</td>
    <td th:text="${studentDetail.student.nickname}">やまちゃん</td>
    <td th:text="${studentDetail.student.email}">taro@example.com</td>
    <td th:text="${studentDetail.student.region}">東京都</td>
    <td th:text="${studentDetail.student.gender}">男性</td>
    <td th:text="${studentDetail.student.remark}">特になし</td>
    <td>
      <div th:each="course : ${studentDetail.studentsCourses}">
        <span th:text="${course.courseName}">Javaコース</span>
        （開始：
        <span th:text="${#temporals.format(course.startDate, 'yyyy/MM/dd')}">2026/02/02</span>
        〜 終了予定：
        <span th:text="${#temporals.format(course.expectedEndDate, 'yyyy/MM/dd')}">2026/03/02</span>
        ）
      </div>
    </td>
    <td>
      <a th:href="@{'/student/' + ${studentDetail.student.id}}">詳細</a>
    </td>
  </tr>
  </tbody>
</table>
</body>
</html>
